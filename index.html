<!DOCTYPE HTML>
<html>
	<head>
		<title>Portfolio Sandra Martinez</title>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
		<link rel="stylesheet" href="assets/css/main.css" />
		<noscript><link rel="stylesheet" href="assets/css/noscript.css" /></noscript>
		
		<style>
			/* ==========================================================
			   SOLUCIÓN MOSAICO UNIFORME (PANORÁMICO)
			   ========================================================== */

			/* 1. Forzamos que todos los cuadritos midan lo mismo de alto */
			#thumbnails article {
				height: 250px !important; /* Altura fija para todas las miniaturas */
				overflow: hidden;
				background-color: #000;
			}

			/* 2. Hacemos que la foto rellene el espacio sin bandas negras */
			#thumbnails article .thumbnail img {
				width: 100% !important;
				height: 100% !important;
				object-fit: cover !important; /* ESTO ES LO MÁS IMPORTANTE: Rellena y recorta */
				object-position: center !important; /* Centra el recorte */
				display: block;
			}

			/* Ajuste para que los títulos no se pisen */
			#thumbnails article h2 {
				pointer-events: none;
				text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
			}

			/* Evita que el mosaico se vea vacío mientras carga */
			#thumbnails {
				display: flex;
				flex-wrap: wrap;
				min-height: 100vh;
			}
		</style>
	</head>
	<body class="is-preload-0 is-preload-1 is-preload-2">

		<div id="main">

			<header id="header">
				<h1>Sandra Martinez</h1>
				<p>Portfolio</p>
				<ul class="icons">
					<li><a href="#" class="icon brands fa-instagram"><span class="label">Instagram</span></a></li>
					<li><a href="#" class="icon fa-envelope"><span class="label">Email</span></a></li>
				</ul>
			</header>

			<section id="thumbnails">
				</section>

			<footer id="footer">
				<ul class="copyright">
					<li>&copy; Portfolio.</li><li>Design: <a href="http://html5up.net">HTML5 UP</a>.</li>
				</ul>
			</footer>

		</div>

		<script src="assets/js/jquery.min.js"></script>
		<script src="assets/js/browser.min.js"></script>
		<script src="assets/js/breakpoints.min.js"></script>
		
		<script>
			// TU URL DE GOOGLE SHEETS
			const urlAPI = 'https://script.google.com/macros/s/AKfycbxQmQGl6ejwxhUVy0irWLtreT8t-EQzdiIqJAqpwlmhQM4fEaHXTzZruaWofNDLFB0/exec';

			fetch(urlAPI)
				.then(response => response.json())
				.then(data => {
					const contenedor = document.getElementById('thumbnails');
					
					if (data.galeria && data.galeria.length > 0) {
						contenedor.innerHTML = ''; 
						
						data.galeria.forEach(foto => {
							if(foto.imagen && foto.imagen.trim() !== "") {
								const articulo = document.createElement('article');
								articulo.innerHTML = `
									<a class="thumbnail" href="${foto.imagen}">
										<img src="${foto.imagen}" alt="${foto.titulo || ''}" />
									</a>
									<h2>${foto.titulo || ''}</h2>
									<p>${foto.desc || ''}</p>
								`;
								contenedor.appendChild(articulo);
							}
						});
					}
					activarDiseno();
				})
				.catch(error => {
					console.error("Error:", error);
					activarDiseno();
				});

			function activarDiseno() {
				const script = document.createElement('script');
				script.src = 'assets/js/main.js';
				script.onload = function() {
					setTimeout(() => {
						document.body.classList.remove('is-preload-0', 'is-preload-1', 'is-preload-2');
					}, 300);
				};
				document.body.appendChild(script);
			}
		</script>
	</body>
</html>
