<!DOCTYPE HTML>
<html>
	<head>
		<title>Portfolio Sandra Martinez</title>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
		<link rel="stylesheet" href="assets/css/main.css" />
		<noscript><link rel="stylesheet" href="assets/css/noscript.css" /></noscript>
		
		<style>
			/* REGLAS PARA UN MOSAICO PERFECTO */
			
			/* 1. Forzamos que cada cuadro tenga siempre la misma altura */
			#thumbnails article {
				height: 250px !important; /* Altura fija para que todas las filas sean iguales */
				max-height: 250px !important;
				background: #000;
				margin: 0 !important; /* Mantenemos el estilo pegado original */
			}

			/* 2. Forzamos a la imagen a rellenar el cuadro SIN dejar huecos negros */
			#thumbnails article .thumbnail img {
				width: 100% !important;
				height: 100% !important;
				object-fit: cover !important; /* Corta los lados o arriba/abajo para rellenar */
				object-position: center !important;
				display: block !important;
			}

			/* 3. Ajuste para que el diseño no se "rompa" en móviles */
			@media screen and (max-width: 480px) {
				#thumbnails article {
					height: 200px !important;
				}
			}
		</style>
	</head>
	<body class="is-preload-0 is-preload-1 is-preload-2">

		<div id="main">

				<header id="header">
						<h1>Sandra Martinez</h1>
						<p>Portfolio</p>
						<ul class="icons">
							<li><a href="#" class="icon brands fa-instagram"><span class="label">Instagram</span></a></li>
							<li><a href="#" class="icon fa-envelope"><span class="label">Email</span></a></li>
						</ul>
					</header>

				<section id="thumbnails">
						</section>

				<footer id="footer">
						<ul class="copyright">
							<li>&copy; Portfolio.</li><li>Design: <a href="http://html5up.net">HTML5 UP</a>.</li>
						</ul>
					</footer>

			</div>

		<script src="assets/js/jquery.min.js"></script>
			<script src="assets/js/browser.min.js"></script>
			<script src="assets/js/breakpoints.min.js"></script>
			
			<script>
				const urlAPI = 'https://script.google.com/macros/s/AKfycbxQmQGl6ejwxhUVy0irWLtreT8t-EQzdiIqJAqpwlmhQM4fEaHXTzZruaWofNDLFB0/exec';

				fetch(urlAPI)
					.then(response => response.json())
					.then(data => {
						const section = document.getElementById('thumbnails');
						if (data.galeria && data.galeria.length > 0) {
							section.innerHTML = '';
							data.galeria.forEach(foto => {
								if(foto.imagen) {
									const art = document.createElement('article');
									art.innerHTML = `
										<a class="thumbnail" href="${foto.imagen}">
											<img src="${foto.imagen}" alt="" />
										</a>
										<h2>${foto.titulo || ''}</h2>
										<p>${foto.desc || ''}</p>
									`;
									section.appendChild(art);
								}
							});
						}
						// Iniciamos el diseño
						const script = document.createElement('script');
						script.src = 'assets/js/main.js';
						script.onload = function() {
							setTimeout(() => {
								document.body.classList.remove('is-preload-0', 'is-preload-1', 'is-preload-2');
							}, 200);
						};
						document.body.appendChild(script);
					})
					.catch(err => console.error(err));
			</script>
	</body>
</html>
