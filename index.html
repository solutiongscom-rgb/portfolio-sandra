<!DOCTYPE HTML>
<html>
	<head>
		<title>Portfolio Sandra Martinez</title>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
		<link rel="stylesheet" href="assets/css/main.css" />
		<noscript><link rel="stylesheet" href="assets/css/noscript.css" /></noscript>
		
		<style>
			/* ==========================================================
			   SOLUCIÓN DEFINITIVA: MOSAICO CUADRADO Y SIN BORDES
			   ========================================================== */

			/* 1. Definimos los cuadros del mosaico como CUADRADOS perfectos */
			#thumbnails article {
				width: 250px !important;  /* Ancho fijo (puedes subirlo o bajarlo) */
				height: 250px !important; /* ALTO IGUAL AL ANCHO = CUADRADO */
				overflow: hidden;
				margin: 5px !important; /* Un pequeño espacio entre fotos */
				padding: 0 !important;
				border: none !important; /* Quitamos bordes raros de la plantilla */
				display: inline-block; /* Para que se alineen uno al lado del otro */
				vertical-align: top;
				background: #000; /* Fondo negro si la foto falla */
			}

			/* 2. Forzamos que el enlace ocupe todo el cuadro */
			#thumbnails article .thumbnail {
				width: 100% !important;
				height: 100% !important;
				display: block !important;
				margin: 0 !important;
				padding: 0 !important;
				border: none !important;
			}

			/* 3. La MAGIA: object-fit cover en un cuadro perfecto ELIMINA las bandas negras */
			#thumbnails article .thumbnail img {
				width: 100% !important;
				height: 100% !important;
				object-fit: cover !important; /* ESTA ES LA CLAVE: Llena el cuadro y recorta lo sobrante */
				object-position: center !important; /* Centra el recorte para no cortar cabezas */
				margin: 0 !important;
				padding: 0 !important;
				border: none !important;
			}

			/* Evita que los títulos se muevan */
			#thumbnails article h2 {
				pointer-events: none;
			}
			
			/* Limpieza adicional del contenedor principal */
			#thumbnails {
				text-align: center; /* Centra el mosaico entero en la pantalla */
				padding: 20px !important;
			}
		</style>
	</head>
	<body class="is-preload-0 is-preload-1 is-preload-2">

		<div id="main">

				<header id="header">
						<h1>Sandra Martinez</h1>
						<p>Portfolio</p>
						<ul class="icons">
							<li><a href="#" class="icon brands fa-instagram"><span class="label">Instagram</span></a></li>
							<li><a href="#" class="icon fa-envelope"><span class="label">Email</span></a></li>
						</ul>
					</header>

				<section id="thumbnails">
						</section>

				<footer id="footer">
						<ul class="copyright">
							<li>&copy; Portfolio.</li><li>Design: <a href="http://html5up.net">HTML5 UP</a>.</li>
						</ul>
					</footer>

			</div>

		<script src="assets/js/jquery.min.js"></script>
			<script src="assets/js/browser.min.js"></script>
			<script src="assets/js/breakpoints.min.js"></script>
			
			<script>
				// TU URL MÁGICA DE GOOGLE APPS SCRIPT
				const urlGoogleSheet = 'https://script.google.com/macros/s/AKfycbxQmQGl6ejwxhUVy0irWLtreT8t-EQzdiIqJAqpwlmhQM4fEaHXTzZruaWofNDLFB0/exec';

				fetch(urlGoogleSheet)
					.then(response => response.json())
					.then(data => {
						const contenedor = document.getElementById('thumbnails');
						
						if (data.galeria && data.galeria.length > 0) {
							contenedor.innerHTML = ''; // Limpiamos la zona de carga
							
							// Inyectamos las fotos de Sandra
							data.galeria.forEach(foto => {
								if(foto.imagen) { // Solo si hay enlace de imagen
									const articulo = document.createElement('article');
									articulo.innerHTML = `
										<a class="thumbnail" href="${foto.imagen}">
											<img src="${foto.imagen}" alt="${foto.titulo || ''}" />
										</a>
										<h2>${foto.titulo || ''}</h2>
										<p>${foto.desc || ''}</p>
									`;
									contenedor.appendChild(articulo);
								}
							});
						}
						// Cargamos los efectos visuales de la plantilla Lens
						cargarEfectosLens();
					})
					.catch(error => {
						console.error("Error cargando fotos:", error);
						cargarEfectosLens();
					});

				function cargarEfectosLens() {
					const script = document.createElement('script');
					script.src = 'assets/js/main.js';
					
					script.onload = function() {
						// Cuando el diseño termine de cargar, ¡Levantamos el telón negro!
						setTimeout(() => {
							document.body.classList.remove('is-preload-0', 'is-preload-1', 'is-preload-2');
						}, 300);
					};
					
					document.body.appendChild(script);
				}
			</script>
	</body>
</html>
