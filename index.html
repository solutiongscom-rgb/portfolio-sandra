<!DOCTYPE HTML>
<html>
	<head>
		<title>Portfolio Sandra</title>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
		<link rel="stylesheet" href="assets/css/main.css" />
		<noscript><link rel="stylesheet" href="assets/css/noscript.css" /></noscript>
		<script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
	</head>
	<body class="is-preload-0 is-preload-1 is-preload-2">

		<div id="main">

				<header id="header">
						<h1>Sandra Martinez</h1>
						<p>Portfolio</p>
						<ul class="icons">
							<li><a href="#" class="icon brands fa-instagram"><span class="label">Instagram</span></a></li>
							<li><a href="#" class="icon fa-envelope"><span class="label">Email</span></a></li>
						</ul>
					</header>

				<section id="thumbnails">
						</section>

				<footer id="footer">
						<ul class="copyright">
							<li>&copy; Portfolio.</li><li>Design: <a href="http://html5up.net">HTML5 UP</a>.</li>
						</ul>
					</footer>

			</div>

		<script src="assets/js/jquery.min.js"></script>
			<script src="assets/js/browser.min.js"></script>
			<script src="assets/js/breakpoints.min.js"></script>
			
		<script>
				// Añadimos un "marcador de tiempo" para que el archivo siempre parezca nuevo
fetch('/datos.json?v=' + Date.now())
					.then(response => response.json())
					.then(data => {
						const contenedorFotos = document.getElementById('thumbnails');
						
						if (data.galeria && data.galeria.length > 0) {
							contenedorFotos.innerHTML = ''; // Limpiamos la zona
							
							// Inyectamos las fotos de Sandra
							data.galeria.forEach(foto => {
								const articulo = document.createElement('article');
								articulo.innerHTML = `
									<a class="thumbnail" href="${foto.imagen}">
										<img src="${foto.imagen}" alt="${foto.titulo || ''}" />
									</a>
									<h2>${foto.titulo || ''}</h2>
									<p>${foto.desc || ''}</p>
								`;
								contenedorFotos.appendChild(articulo);
							});
						}
						// Llamamos al diseño SOLO cuando las fotos ya están cargadas
						cargarEfectosDeDiseno();
					})
					.catch(error => {
						console.log("Cargando web inicial...");
						cargarEfectosDeDiseno();
					});

				function cargarEfectosDeDiseno() {
					const scriptDiseno = document.createElement('script');
					scriptDiseno.src = 'assets/js/main.js';
					
					// MAGIA PURA: Cuando el diseño termine de cargar, ¡Levantamos el telón negro!
					scriptDiseno.onload = function() {
						setTimeout(() => {
							document.body.classList.remove('is-preload-0', 'is-preload-1', 'is-preload-2');
						}, 200); // Le damos medio segundito de margen visual
					};
					
					document.body.appendChild(scriptDiseno);
				}
			</script>
	</body>
</html>
